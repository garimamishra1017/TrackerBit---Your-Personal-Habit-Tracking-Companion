<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Summary - TrackerBit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="logo">
                <i class="fas fa-chart-line"></i> TrackerBit
            </a>
            <div class="nav-links">
                <a href="/">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <div class="dropdown">
                    <button class="dropdown-btn">
                        <i class="fas fa-tasks"></i> Tasks/Summary <i class="fas fa-caret-down"></i>
                    </button>
                    <div class="dropdown-content">
                        <a href="/tasks">
                            <i class="fas fa-list"></i> Tasks
                        </a>
                        <a href="/daily-summary" class="active">
                            <i class="fas fa-calendar-day"></i> Summary
                        </a>
                    </div>
                </div>
                <a href="/profile">
                    <i class="fas fa-user"></i> Profile
                </a>
                <a href="/logout" class="btn btn-secondary">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <main class="container daily-summary-page">
        <h1><i class="fas fa-calendar-day"></i> Daily Summary</h1>
        
        <div class="date-navigation">
            <button onclick="previousDate()" class="btn btn-secondary">
                <i class="fas fa-chevron-left"></i> Previous Day
            </button>
            <div class="date-picker-container">
                <input type="date" id="datePicker" class="date-picker" onchange="selectDate(this.value)">
                <h2 id="currentDate"></h2>
            </div>
            <button onclick="nextDate()" class="btn btn-secondary">
                Next Day <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <h3><i class="fas fa-sync-alt"></i> Habits</h3>
                <div id="habits-summary" class="summary-list"></div>
            </div>

            <div class="summary-card">
                <h3><i class="fas fa-calendar-day"></i> Dailies</h3>
                <div id="dailies-summary" class="summary-list"></div>
            </div>

            <div class="summary-card">
                <h3><i class="fas fa-clipboard-list"></i> To-Dos</h3>
                <div id="todos-summary" class="summary-list"></div>
            </div>

            <div class="summary-card">
                <h3><i class="fas fa-chart-bar"></i> Statistics</h3>
                <div class="stats-container">
                    <div class="stat-item">
                        <span class="stat-label">Completion Rate</span>
                        <div class="progress-bar">
                            <div id="completionRate" class="progress" style="width: 0%"></div>
                        </div>
                        <span id="completionRateText">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Experience Gained</span>
                        <span id="experienceGained">0 XP</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Health Change</span>
                        <span id="healthChange">0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/daily_summary.js') }}"></script>
</body>
</html>
